#This workflow will do a clean installation of node dependencies, cache/restore them, run tests.

name: CI

on:
    workflow_dispatch:
    pull_request:
        branches: ['main']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - run: npm ci
            - run: npm test
